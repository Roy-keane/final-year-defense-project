<h2>Available Palm Oil Products</h2>
<div class="card-grid">
  @for (p of products(); track p.id) {
    <div class="card">
      <img [src]="p.imageUrl || 'https://placehold.co/400x250?text=Palm+Oil'" alt="{{p.name}}" style="width:100%;border-radius:8px;aspect-ratio:16/10;object-fit:cover;" />
      <h3>{{ p.name }}</h3>
      <p>{{ p.description }}</p>
      <p><strong>Size:</strong> {{ p.sizeLiters }} L</p>
      <p><strong>Price:</strong> ₦{{ p.price }}</p>
      <button class="btn primary">Add to Cart</button>
    </div>
  }
</div>
